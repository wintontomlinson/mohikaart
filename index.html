<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fdf9f0" />
    <title>Mohika Art - Customized Resin Crafts & Handmade Gifts</title>
    <meta name="description" content="Mohika Art handcrafts premium customized resin keepsakes — name keychains, photo frames, wedding memories, bookmarks & luxury gift hampers. Pan India delivery." />
    <meta name="keywords" content="resin art, customized gifts, handmade gifts, wedding bouquet preservation, name keychain, photo frame, corporate gifts, India" />
    <meta name="author" content="Mohika Art" />
    <link rel="canonical" href="/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="image" href="/src/assets/hero-resin-tray.jpg" fetchpriority="high" />

    <meta property="og:title" content="Mohika Art - Customized Resin Crafts & Gifts" />
    <meta property="og:description" content="Turn memories into timeless art. Premium handmade resin keepsakes, personalized for every occasion." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="robots" content="index, follow" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), browsing-topics=(), interest-cohort=(), payment=(self https://checkout.razorpay.com)" />
  </head>

  <body>
    <!-- ═══ FAST LOADING SCREEN ═══ -->
    <div id="splash-loader" style="position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(168deg,hsl(36 42% 99%) 0%,hsl(35 32% 96%) 100%);transition:opacity 0.5s ease,transform 0.5s ease;">
      <style>
        @keyframes s-in{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
        @keyframes s-blob{0%,100%{border-radius:40% 60% 70% 30%/40% 50% 60% 50%;transform:scale(1)}50%{border-radius:60% 40% 30% 70%/50% 60% 40% 60%;transform:scale(1.05)}}
        @keyframes s-glow{0%,100%{box-shadow:0 8px 32px -8px hsla(34,58%,52%,0.3)}50%{box-shadow:0 14px 52px -6px hsla(34,58%,52%,0.5)}}
        @keyframes s-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        @keyframes s-fill{from{width:0%}to{width:100%}}
        #splash-loader.fade-out{opacity:0;transform:scale(1.02);pointer-events:none}
      </style>

      <!-- Blobs -->
      <div style="position:absolute;top:18%;left:18%;width:360px;height:360px;border-radius:50%;background:hsla(348,55%,90%,0.2);filter:blur(80px);animation:s-blob 6s ease-in-out infinite"></div>
      <div style="position:absolute;bottom:18%;right:18%;width:380px;height:380px;border-radius:50%;background:hsla(38,65%,91%,0.2);filter:blur(80px);animation:s-blob 8s ease-in-out infinite 1s"></div>

      <!-- Logo -->
      <div style="width:110px;height:110px;border-radius:26px;background:white;display:flex;align-items:center;justify-content:center;animation:s-in 0.4s ease forwards,s-glow 2s 0.4s ease-in-out infinite;position:relative;overflow:hidden">
        <img src="/mohika-mark.png" alt="Mohika Art" width="80" height="80" style="object-fit:contain;animation:s-pulse 2.5s 0.5s ease-in-out infinite" />
        <div style="position:absolute;inset:0;border-radius:26px;border:2px solid hsla(34,58%,52%,0.3);pointer-events:none"></div>
      </div>

      <!-- Brand -->
      <div style="margin-top:22px;text-align:center;animation:s-in 0.35s 0.15s ease forwards;opacity:0">
        <div style="font-family:'Playfair Display',Georgia,serif;font-size:1.75rem;font-weight:300;background:linear-gradient(118deg,hsl(34 52% 42%),hsl(38 72% 62%));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Mohika Art</div>
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.4em;color:hsl(25 10% 48%);margin-top:8px;font-family:system-ui,sans-serif">Customized Resin Crafts</div>
      </div>

      <!-- Counter -->
      <div id="splash-percent" style="margin-top:24px;font-family:system-ui,sans-serif;font-size:26px;font-weight:700;color:hsl(34 52% 42%);opacity:0;animation:s-in 0.25s 0.2s ease forwards">0%</div>

      <!-- Progress bar -->
      <div style="margin-top:10px;width:180px;height:5px;border-radius:9999px;background:hsl(34 28% 88%);overflow:hidden;opacity:0;animation:s-in 0.25s 0.25s ease forwards">
        <div id="splash-bar" style="height:100%;background:linear-gradient(90deg,hsl(34 58% 52%),hsl(38 65% 58%),hsl(34 58% 48%));border-radius:9999px;width:0%;animation:s-fill 1.2s 0.3s ease-out forwards"></div>
      </div>
    </div>

    <!-- Fast counter: 0→100% in 1.2s -->
    <script>
      (function(){
        var el=document.getElementById('splash-percent');
        if(!el)return;
        var start=performance.now(),dur=1200,delay=300;
        function t(now){
          var e=now-start-delay;
          if(e<0){requestAnimationFrame(t);return}
          var p=Math.min(100,Math.round((e/dur)*100));
          el.textContent=p+'%';
          if(p<100)requestAnimationFrame(t);
        }
        requestAnimationFrame(t);
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
