<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fdf9f0" />
    <title>Mohika Art - Customized Resin Crafts & Handmade Gifts</title>
    <meta name="description" content="Mohika Art handcrafts premium customized resin keepsakes — name keychains, photo frames, wedding memories, bookmarks & luxury gift hampers. Pan India delivery." />
    <meta name="keywords" content="resin art, customized gifts, handmade gifts, wedding bouquet preservation, name keychain, photo frame, corporate gifts, India" />
    <meta name="author" content="Mohika Art" />
    <link rel="canonical" href="/" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.png" />

    <!-- Font preconnect speeds up Playfair / Cormorant / DM Sans loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <meta property="og:title" content="Mohika Art - Customized Resin Crafts & Gifts" />
    <meta property="og:description" content="Turn memories into timeless art. Premium handmade resin keepsakes, personalized for every occasion." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="robots" content="index, follow" />

    <!-- ────────────────────────────────────────────────────────────
         Browser-side security hardening (defense in depth)
         The real authority lives in Supabase RLS + create_order RPC,
         but these meta-tags drastically reduce the blast radius of
         any front-end XSS or content-injection mistakes.
         ──────────────────────────────────────────────────────────── -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), browsing-topics=(), interest-cohort=(), payment=(self https://checkout.razorpay.com)" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      base-uri 'self';
      object-src 'none';
      frame-ancestors 'self';
      form-action 'self' https://wa.me https://api.whatsapp.com;
      img-src 'self' data: blob: https:;
      font-src 'self' data: https://fonts.gstatic.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      script-src 'self' 'unsafe-inline' https://checkout.razorpay.com;
      connect-src 'self' https: wss:;
      frame-src https://checkout.razorpay.com https://api.razorpay.com https://*.razorpay.com;
      worker-src 'self' blob:;
      upgrade-insecure-requests;
    " />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
